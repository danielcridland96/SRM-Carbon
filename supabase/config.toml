# Supabase CLI project configuration.
# Generated / maintained for: Daniels Project (jdouqwovuqgqkuafrhdo)
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "jdouqwovuqgqkuafrhdo"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
port = 54325
file_size_limit = "50MiB"

[auth]
enabled = true
# Site URL — update if the Netlify domain changes
site_url = "https://srm-carbon.netlify.app"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
# Set to true once staff onboarding is stable to prevent random sign-ups
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # Set true in production to enforce email verification

[auth.sms]
enable_signup = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083
